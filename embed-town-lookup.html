<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Town's Results | BDN 2026 Primary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
      font-size: 14px; color: #1a1a1a; background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .embed-wrap { max-width: 920px; margin: 0 auto; padding: 0 0 4px; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .embed-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 14px 0 12px; gap: 12px; flex-wrap: wrap;
    }
    .embed-title  { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .embed-sub    { font-size: 12px; color: #767676; margin-top: 3px; }
    .hdr-logos    { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* ── Search ──────────────────────────────────────────────────────────── */
    .search-section { margin-bottom: 18px; position: relative; }
    .search-wrap    { position: relative; }
    .town-input {
      width: 100%; padding: 13px 44px 13px 16px; font-size: 16px;
      font-family: inherit; border: 2px solid #c8c8c8; border-radius: 8px;
      outline: none; color: #1a1a1a; background: #fff;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    .town-input:focus { border-color: #2e6b3e; }
    .town-input::placeholder { color: #aaa; }
    .search-icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none; color: #aaa;
    }
    .clear-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: #aaa; padding: 0; line-height: 1; display: none;
    }
    .clear-btn:hover { color: #444; }

    .autocomplete-drop {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
      background: #fff; border: 1px solid #c8c8c8; border-top: none;
      border-radius: 0 0 8px 8px; overflow-y: auto; max-height: 240px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12); list-style: none;
    }
    .autocomplete-drop li {
      padding: 10px 16px; cursor: pointer; font-size: 14px;
      border-bottom: 1px solid #f2f2f2;
    }
    .autocomplete-drop li:last-child { border-bottom: none; }
    .autocomplete-drop li:hover, .autocomplete-drop li.ac-active { background: #f2f9f5; color: #1a1a1a; }
    .ac-match { font-weight: 700; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      padding: 36px 20px; text-align: center;
      border: 1px dashed #c8c8c8; border-radius: 8px;
    }
    .empty-icon { font-size: 28px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; color: #767676; line-height: 1.55; max-width: 340px; margin: 0 auto; }
    .empty-state .demo-note { font-size: 12px; margin-top: 10px; color: #aaa; }

    /* ── Results header ──────────────────────────────────────────────────── */
    .results-hdr {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px; gap: 8px; flex-wrap: wrap;
    }
    .results-town  { font-size: 20px; font-weight: 700; }
    .results-county { font-size: 12px; color: #767676; margin-top: 3px; }
    .results-upd   { font-size: 11px; color: #767676; padding-top: 5px; white-space: nowrap; }

    /* ── Race card grid ──────────────────────────────────────────────────── */
    .race-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 560px) { .race-grid { grid-template-columns: 1fr; } }

    /* ── Race card ───────────────────────────────────────────────────────── */
    .race-card { border: 1px solid #c8c8c8; border-radius: 8px; overflow: hidden; background: #fff; }
    .card-hdr  { padding: 10px 12px 8px; background: #f2f2f2; border-bottom: 1px solid #c8c8c8; }
    .card-office { font-size: 13px; font-weight: 700; color: #1a1a1a; }
    .card-badges { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .party-pill  {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px;
      border-radius: 100px; white-space: nowrap;
    }
    .party-pill.dem { background: #E8F0FA; color: #1A5FAB; }
    .party-pill.rep { background: #fae8e8; color: #CC2929; }

    /* ── Candidate rows ──────────────────────────────────────────────────── */
    .card-body   { padding: 6px 0 2px; }
    .cand-row    { display: flex; align-items: center; gap: 7px; padding: 5px 12px; }
    .cand-name   { font-size: 13px; color: #1a1a1a; min-width: 84px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cand-name.leader { font-weight: 700; }
    .bar-track   { flex: 1; height: 5px; background: #e8e8e8; border-radius: 100px; overflow: hidden; min-width: 24px; }
    .bar-fill    { height: 100%; border-radius: 100px; transition: width 0.4s ease; }
    .cand-pct    { font-size: 12px; font-weight: 700; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }
    .cand-votes  { font-size: 11px; color: #767676; min-width: 44px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Card footer ─────────────────────────────────────────────────────── */
    .card-foot {
      padding: 6px 12px 8px; border-top: 1px solid #f2f2f2;
      font-size: 11px; color: #767676;
    }
    .card-state-msg { padding: 20px 12px; font-size: 13px; color: #767676; text-align: center; }

    /* ── Attribution ─────────────────────────────────────────────────────── */
    .embed-footer { font-size: 11px; color: #bbb; text-align: right; padding: 10px 0 0; }
  </style>
</head>
<body>
<div class="embed-wrap">

  <!-- Header -->
  <div class="embed-header">
    <div>
      <h1 class="embed-title">Find your town&rsquo;s results</h1>
      <p class="embed-sub">2026 Maine Primary Election &middot; June 9, 2026</p>
    </div>
    <div class="hdr-logos">
      <img src="public/ddhq-logo.png" alt="DDHQ" style="height:14px;width:auto;opacity:0.75">
      <img src="public/bdn-logo.webp" alt="BDN"  style="height:14px;width:auto">
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-wrap">
      <input type="text" id="town-input" class="town-input"
        placeholder="Enter your town or city&hellip;"
        autocomplete="off" spellcheck="false"
        oninput="onInput(this.value)"
        onkeydown="onKeydown(event)">
      <span class="search-icon" id="search-icon">&#x1F50D;</span>
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()" aria-label="Clear">&#x2715;</button>
      <ul id="ac-drop" class="autocomplete-drop" style="display:none" role="listbox"></ul>
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state">
    <div class="empty-icon">&#x1F4CD;</div>
    <p>Type your Maine town or city above to see local results across all 2026 primary races.</p>
    <p class="demo-note">Demo mode &mdash; try: Portland, Bangor, Augusta, Lewiston, or Biddeford</p>
  </div>

  <!-- Results -->
  <div id="results-wrap" style="display:none">
    <div class="results-hdr">
      <div>
        <div id="results-town"  class="results-town"></div>
        <div id="results-county" class="results-county"></div>
      </div>
      <div id="results-upd" class="results-upd"></div>
    </div>
    <div id="race-grid" class="race-grid"></div>
  </div>

  <div class="embed-footer">Results by Decision Desk HQ &middot; Bangor Daily News</div>
</div>

<script>
// ── Config — set each url to the race's API endpoint ────────────────────────
var RACE_CONFIGS = [
  { id:'gov-dem',    office:'Governor',               party:'Democratic', cls:'dem', color:'#1A5FAB', url:null },
  { id:'gov-rep',    office:'Governor',               party:'Republican', cls:'rep', color:'#CC2929', url:null },
  { id:'senate-dem', office:'U.S. Senate',            party:'Democratic', cls:'dem', color:'#1A5FAB', url:null },
  { id:'cd1-rep',    office:'U.S. House, District 1', party:'Republican', cls:'rep', color:'#CC2929', url:null },
  { id:'cd2-dem',    office:'U.S. House, District 2', party:'Democratic', cls:'dem', color:'#1A5FAB', url:null },
];

var GEO_BASE = 'public';
var POLL_MS  = 30000;

// ── Mock candidate rosters ────────────────────────────────────────────────────
var MOCK_CANDS = {
  'gov-dem': [
    {cand_id:950890,first_name:'Shenna', last_name:'Bellows'},
    {cand_id:950891,first_name:'Troy',   last_name:'Jackson'},

    {cand_id:950900,first_name:'Laurence', last_name:'Charles'},
    {cand_id:950901,first_name:'John',     last_name:'Jones'},
    {cand_id:950902,first_name:'Tiffany',  last_name:'Libby'},
    {cand_id:950903,first_name:'Wayne',    last_name:'Mason'},
    {cand_id:950904,first_name:'Patrick',  last_name:'McCarthy'},
    {cand_id:950905,first_name:'Kenneth',  last_name:'Midgley'},
    {cand_id:950906,first_name:'Heidi',    last_name:'Wessels'},
  ],
  'senate-dem': [
    {cand_id:950882,first_name:'Maggie',   last_name:'Costello'},
    {cand_id:950883,first_name:'Janet',    last_name:'Mills'},
    {cand_id:950884,first_name:'Rebecca',  last_name:'Platner'},
  ],
  'cd1-rep': [
    {cand_id:950896,first_name:'Michael',  last_name:'Pietrowicz'},
    {cand_id:950897,first_name:'Mark',     last_name:'Russell'},
  ],
  'cd2-dem': [
    {cand_id:950886,first_name:'John',     last_name:'Baldacci'},
    {cand_id:950887,first_name:'Matt',     last_name:'Dunlap'},
    {cand_id:950888,first_name:'Austin',   last_name:'Loud'},
    {cand_id:950889,first_name:'Kathy',    last_name:'Wood'},
  ],
};

// Mock town results: { race_id: { cand_id: votes } }
// Race IDs absent from a town's entry = not in that district
var MOCK_TOWNS = {
  'Portland': {
    county:'Cumberland',
    'gov-dem':    {950890:1620,950891:420, 950892:1340,950893:1890,950894:1850},
    'gov-rep':    {950899:530, 950900:120, 950901:210, 950902:1540,950903:90, 950904:150,950905:80, 950906:130},
    'senate-dem': {950882:1240,950883:3890,950884:890},
    'cd1-rep':    {950896:1420,950897:1820},
  },
  'Bangor': {
    county:'Penobscot',
    'gov-dem':    {950890:1080,950891:580,950892:980, 950893:720, 950894:1240},
    'gov-rep':    {950899:480, 950900:90, 950901:180, 950902:980, 950903:70, 950904:110,950905:60, 950906:100},
    'senate-dem': {950882:780, 950883:2240,950884:560},
    'cd2-dem':    {950886:580, 950887:620,950888:320,950889:210},
  },
  'Augusta': {
    county:'Kennebec',
    'gov-dem':    {950890:540,950891:280,950892:580,950893:450,950894:620},
    'gov-rep':    {950899:310,950900:60, 950901:110,950902:640,950903:50,950904:80,950905:40,950906:70},
    'senate-dem': {950882:430,950883:1240,950884:320},
    'cd2-dem':    {950886:280,950887:310,950888:160,950889:110},
  },
  'Lewiston': {
    county:'Androscoggin',
    'gov-dem':    {950890:980,950891:310,950892:820,950893:640,950894:890},
    'gov-rep':    {950899:420,950900:80, 950901:160,950902:860,950903:60,950904:100,950905:50,950906:80},
    'senate-dem': {950882:710,950883:2010,950884:490},
    'cd1-rep':    {950896:860,950897:980},
  },
  'Biddeford': {
    county:'York',
    'gov-dem':    {950890:420,950891:180,950892:360,950893:550,950894:490},
    'gov-rep':    {950899:210,950900:50, 950901:90, 950902:440,950903:30,950904:60,950905:30,950906:50},
    'senate-dem': {950882:340,950883:980, 950884:240},
    'cd1-rep':    {950896:420,950897:490},
  },
};

// ── Colors ────────────────────────────────────────────────────────────────────
var DEM_COLORS = ['#1A5FAB','#2980B9','#1ABC9C','#2C3E6B','#5B8FD4','#8EC6E6'];
var REP_COLORS = ['#CC2929','#E67E22','#8E44AD','#C0392B','#D35400','#884EA0'];
var OTHER_CLR  = '#aaaaaa';

function buildColorMap(cands, votes, total, cls) {
  var pal = cls === 'rep' ? REP_COLORS : DEM_COLORS;
  var map = {}, i, id;
  if (cands.length >= 5 && total > 0) {
    var s = cands.slice().sort(function(a,b){return(votes[String(b.cand_id)]||0)-(votes[String(a.cand_id)]||0);});
    var idx = 0;
    for (i = 0; i < s.length; i++) {
      id = s[i].cand_id;
      map[id] = ((votes[String(id)]||0)/total*100) > 10 ? pal[idx++] : OTHER_CLR;
    }
    return map;
  }
  for (i = 0; i < cands.length; i++) map[cands[i].cand_id] = pal[i % pal.length];
  return map;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString(); }
function sumObj(o) { var t=0,k=Object.keys(o); for(var i=0;i<k.length;i++) t+=o[k[i]]||0; return t; }

// Extract {votes, found} for a town from a live DDHQ race object
function extractTownVotes(raceObj, townName) {
  if (!raceObj) return null;
  // DDHQ live format: raceObj.counties[].vcus[].vcu / .votes
  if (raceObj.counties) {
    for (var i = 0; i < raceObj.counties.length; i++) {
      var co = raceObj.counties[i];
      for (var j = 0; j < co.vcus.length; j++) {
        if (co.vcus[j].vcu === townName) {
          var v = co.vcus[j].votes || {};
          return { votes: v, total: sumObj(v), county: co.county };
        }
      }
    }
    return null; // VCU not in this race → not in this district
  }
  return null;
}

// ── State ─────────────────────────────────────────────────────────────────────
var townsList   = []; // ['Abbot','Acton',...]
var selectedTown = null; // {name, county}
var liveData    = {};  // race_id → fetched race obj or null
var pollTimer   = null;
var acIdx       = -1;

// ── Load towns.json ───────────────────────────────────────────────────────────
fetch(GEO_BASE + '/towns.json', {cache:'force-cache'})
  .then(function(r){return r.json();})
  .then(function(d){townsList = Array.isArray(d) ? d : [];})
  .catch(function(){townsList = Object.keys(MOCK_TOWNS);});

// ── Autocomplete ──────────────────────────────────────────────────────────────
function onInput(val) {
  toggleClearBtn(val);
  acIdx = -1;
  var drop = document.getElementById('ac-drop');
  if (!val.trim()) { drop.style.display = 'none'; return; }
  var q = val.toLowerCase();
  var list = townsList.length ? townsList : Object.keys(MOCK_TOWNS);
  var starts = [], contains = [];
  for (var i = 0; i < list.length; i++) {
    var n = list[i], nl = n.toLowerCase();
    if (nl.indexOf(q) === 0)        starts.push(n);
    else if (nl.indexOf(q) !== -1)  contains.push(n);
    if (starts.length + contains.length >= 8) break;
  }
  var matches = starts.concat(contains).slice(0, 8);
  if (!matches.length) { drop.style.display = 'none'; return; }

  var html = '';
  for (var j = 0; j < matches.length; j++) {
    var name = matches[j];
    var safe = name.replace(/&/g,'&amp;').replace(/'/g,'&#39;');
    // bold the matching portion
    var re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i');
    var display = name.replace(re,'<span class="ac-match">$1</span>');
    html += '<li role="option" onclick="selectTown(\''+safe+'\')">' + display + '</li>';
  }
  drop.innerHTML = html;
  drop.style.display = 'block';
}

function onKeydown(e) {
  var drop = document.getElementById('ac-drop');
  var items = drop.querySelectorAll('li');
  if (e.key === 'ArrowDown')  { acIdx = Math.min(acIdx+1, items.length-1); setAcActive(items); e.preventDefault(); return; }
  if (e.key === 'ArrowUp')    { acIdx = Math.max(acIdx-1, -1); setAcActive(items); e.preventDefault(); return; }
  if (e.key === 'Enter') {
    if (acIdx >= 0 && items[acIdx]) { items[acIdx].click(); }
    else if (items.length === 1)    { items[0].click(); }
    e.preventDefault(); return;
  }
  if (e.key === 'Escape') { drop.style.display = 'none'; }
}

function setAcActive(items) {
  for (var i = 0; i < items.length; i++) items[i].className = i === acIdx ? 'ac-active' : '';
}

function toggleClearBtn(val) {
  var clr = document.getElementById('clear-btn'), ico = document.getElementById('search-icon');
  clr.style.display = val ? 'block' : 'none';
  ico.style.display = val ? 'none'  : 'block';
}

function clearSearch() {
  document.getElementById('town-input').value = '';
  document.getElementById('ac-drop').style.display = 'none';
  toggleClearBtn('');
  selectedTown = null;
  document.getElementById('results-wrap').style.display = 'none';
  document.getElementById('empty-state').style.display = '';
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('town-input');
  var drop = document.getElementById('ac-drop');
  if (wrap && !wrap.contains(e.target) && drop && !drop.contains(e.target)) {
    drop.style.display = 'none';
  }
});

// ── Select a town ─────────────────────────────────────────────────────────────
function selectTown(name) {
  selectedTown = { name: name, county: '' };
  document.getElementById('town-input').value = name;
  document.getElementById('ac-drop').style.display = 'none';
  toggleClearBtn(name);

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('results-wrap').style.display = '';
  document.getElementById('results-town').textContent  = name;
  document.getElementById('results-county').textContent = '';

  liveData = {};
  fetchAllRaces();

  if (pollTimer) clearInterval(pollTimer);
  var hasLive = RACE_CONFIGS.some(function(rc){return !!rc.url;});
  if (hasLive) pollTimer = setInterval(function(){if(selectedTown)fetchAllRaces();}, POLL_MS);
}

// ── Fetch all race APIs ───────────────────────────────────────────────────────
function fetchAllRaces() {
  var anyLive = false;
  for (var i = 0; i < RACE_CONFIGS.length; i++) {
    var rc = RACE_CONFIGS[i];
    if (!rc.url) continue;
    anyLive = true;
    (function(cfg){
      fetch(cfg.url, {cache:'no-store'})
        .then(function(r){return r.json();})
        .then(function(d){ liveData[cfg.id]=d; renderAll(); })
        .catch(function(){  liveData[cfg.id]=null; renderAll(); });
    })(rc);
  }
  if (!anyLive) renderAll(); // mock mode
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  if (!selectedTown) return;
  var tName = selectedTown.name;
  var cards = [];
  var countyFound = '';

  for (var i = 0; i < RACE_CONFIGS.length; i++) {
    var result = buildCard(RACE_CONFIGS[i], tName);
    if (result.county) countyFound = result.county;
    if (!result.skip) cards.push(result.html);
  }

  if (countyFound) {
    selectedTown.county = countyFound;
    document.getElementById('results-county').textContent = countyFound + ' County';
  }

  document.getElementById('race-grid').innerHTML = cards.join('');

  var upd = document.getElementById('results-upd');
  var hasLive = RACE_CONFIGS.some(function(rc){return !!rc.url;});
  if (hasLive) {
    upd.textContent = 'Last updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
  }
}

function buildCard(rc, townName) {
  var cands, townVotes, county = '', inDistrict;

  if (rc.url) {
    var live = liveData[rc.id];
    if (live === undefined) {
      // still fetching
      return { skip:false, county:'', html: cardShell(rc,
        '<div class="card-state-msg">Loading&hellip;</div>') };
    }
    if (live === null) {
      return { skip:false, county:'', html: cardShell(rc,
        '<div class="card-state-msg">Could not load results.</div>') };
    }
    var tv = extractTownVotes(live, townName);
    if (tv === null) {
      return { skip:true, county:'', html:'' }; // not in this district
    }
    cands      = live.candidates || [];
    townVotes  = tv.votes;
    county     = tv.county || '';
    inDistrict = true;
  } else {
    // Mock mode
    cands = MOCK_CANDS[rc.id] || [];
    var mockTown = MOCK_TOWNS[townName];
    if (!mockTown) {
      // Town not in mock data
      var isCD = rc.id === 'cd1-rep' || rc.id === 'cd2-dem';
      if (isCD) return { skip:true, county:'', html:'' }; // unknown district → hide
      inDistrict = true;
      townVotes  = {};
    } else {
      county = mockTown.county || '';
      if (!mockTown.hasOwnProperty(rc.id)) {
        return { skip:true, county:county, html:'' }; // not in this district
      }
      inDistrict = true;
      townVotes  = mockTown[rc.id];
    }
  }

  var total = sumObj(townVotes);

  if (total === 0) {
    return { skip:false, county:county, html: cardShell(rc,
      '<div class="card-state-msg">No results yet for '+escHtml(townName)+'</div>') };
  }

  var colorMap = buildColorMap(cands, townVotes, total, rc.cls);
  var sorted = cands.slice().sort(function(a,b){
    return (townVotes[String(b.cand_id)]||0)-(townVotes[String(a.cand_id)]||0);
  });

  var maxV = townVotes[String(sorted[0].cand_id)] || 0;
  var body = '<div class="card-body">';
  for (var i = 0; i < sorted.length; i++) {
    var c = sorted[i];
    var v = townVotes[String(c.cand_id)] || 0;
    if (v === 0) continue;
    var pct  = (v/total*100).toFixed(1);
    var barW = maxV > 0 ? (v/maxV*100).toFixed(1) : 0;
    var col  = colorMap[c.cand_id];
    var name = c.last_name + (c.suffix ? ' '+c.suffix : '');
    var isLdr = i === 0;
    body +=
      '<div class="cand-row">' +
        '<span class="cand-name'+(isLdr?' leader':'')+'">'+escHtml(name)+'</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:'+barW+'%;background:'+col+'"></div></div>' +
        '<span class="cand-pct" style="color:'+(isLdr?col:'#767676')+'">'+pct+'%</span>' +
        '<span class="cand-votes">'+fmt(v)+'</span>' +
      '</div>';
  }
  body += '</div>';

  var foot = '<div class="card-foot">'+fmt(total)+' votes cast in '+escHtml(townName)+'</div>';

  return { skip:false, county:county, html: '<div class="race-card">'+cardHdr(rc)+body+foot+'</div>' };
}

function cardHdr(rc) {
  return '<div class="card-hdr">' +
    '<div class="card-office">'+escHtml(rc.office)+'</div>' +
    '<div class="card-badges"><span class="party-pill '+rc.cls+'">'+escHtml(rc.party)+' Primary</span></div>' +
    '</div>';
}

function cardShell(rc, inner) {
  return '<div class="race-card">'+cardHdr(rc)+inner+'</div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
