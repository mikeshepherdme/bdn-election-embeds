<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Town's Results | BDN 2026 Primary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
      font-size: 14px; color: #1a1a1a; background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .embed-wrap { max-width: 920px; margin: 0 auto; padding: 0 0 4px; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .embed-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 14px 0 12px; gap: 12px; flex-wrap: wrap;
    }
    .embed-title { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .embed-sub   { font-size: 12px; color: #767676; margin-top: 3px; }
    .hdr-logos   { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* ── Search ──────────────────────────────────────────────────────────── */
    .search-section { margin-bottom: 18px; position: relative; }
    .search-wrap    { position: relative; }
    .town-input {
      width: 100%; padding: 13px 44px 13px 16px; font-size: 16px;
      font-family: inherit; border: 2px solid #c8c8c8; border-radius: 8px;
      outline: none; color: #1a1a1a; background: #fff;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    .town-input:focus { border-color: #2e6b3e; }
    .town-input::placeholder { color: #aaa; }
    .search-icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none; color: #aaa;
    }
    .clear-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: #aaa; padding: 0; line-height: 1; display: none;
    }
    .clear-btn:hover { color: #444; }
    .autocomplete-drop {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
      background: #fff; border: 1px solid #c8c8c8; border-top: none;
      border-radius: 0 0 8px 8px; overflow-y: auto; max-height: 240px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12); list-style: none;
    }
    .autocomplete-drop li {
      padding: 10px 16px; cursor: pointer; font-size: 14px;
      border-bottom: 1px solid #f2f2f2;
    }
    .autocomplete-drop li:last-child { border-bottom: none; }
    .autocomplete-drop li:hover,
    .autocomplete-drop li.ac-active { background: #f2f9f5; }
    .ac-match { font-weight: 700; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      padding: 36px 20px; text-align: center;
      border: 1px dashed #c8c8c8; border-radius: 8px;
    }
    .empty-icon { font-size: 28px; margin-bottom: 10px; }
    .empty-state p   { font-size: 14px; color: #767676; line-height: 1.55; max-width: 340px; margin: 0 auto; }
    .empty-demo-note { font-size: 12px; margin-top: 10px; color: #aaa; }

    /* ── Results header ──────────────────────────────────────────────────── */
    .results-hdr {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 16px; gap: 8px; flex-wrap: wrap;
    }
    .results-town   { font-size: 20px; font-weight: 700; }
    .results-county { font-size: 12px; color: #767676; margin-top: 3px; }
    .results-upd    { font-size: 11px; color: #767676; padding-top: 5px; white-space: nowrap; }

    /* ── Race group ──────────────────────────────────────────────────────── */
    .race-group { margin-bottom: 22px; }
    .race-group-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: #767676; margin-bottom: 10px;
      padding-bottom: 5px; border-bottom: 1px solid #e8e8e8;
    }
    .race-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    @media (max-width: 560px) { .race-grid { grid-template-columns: 1fr; } }

    /* ── Race card ───────────────────────────────────────────────────────── */
    .race-card { border: 1px solid #c8c8c8; border-radius: 8px; overflow: hidden; background: #fff; }
    .card-hdr  { padding: 10px 12px 8px; background: #f2f2f2; border-bottom: 1px solid #c8c8c8; }
    .card-office { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .card-badges { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .party-pill  {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px;
      border-radius: 100px; white-space: nowrap;
    }
    .party-pill.dem { background: #E8F0FA; color: #1A5FAB; }
    .party-pill.rep { background: #fae8e8; color: #CC2929; }
    .party-pill.non { background: #f0f0f0; color: #444444; }
    .called-pill {
      display: inline-block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px;
      border-radius: 100px; white-space: nowrap;
      background: #dcfce7; color: #166534;
    }

    /* ── Candidate rows ──────────────────────────────────────────────────── */
    .card-body  { padding: 6px 0 2px; }
    .cand-row   { display: flex; align-items: center; gap: 7px; padding: 5px 12px; }
    .cand-dot   { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .cand-name  { font-size: 13px; color: #1a1a1a; min-width: 110px; max-width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cand-name.leader { font-weight: 700; }
    .bar-track  { flex: 1; height: 5px; background: #e8e8e8; border-radius: 100px; overflow: hidden; min-width: 20px; }
    .bar-fill   { height: 100%; border-radius: 100px; transition: width 0.4s ease; }
    .cand-pct   { font-size: 12px; font-weight: 700; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
    .cand-votes { font-size: 11px; color: #767676; min-width: 42px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Card footer ─────────────────────────────────────────────────────── */
    .card-foot      { padding: 6px 12px 8px; border-top: 1px solid #f2f2f2; font-size: 11px; color: #767676; }
    .card-state-msg { padding: 20px 12px; font-size: 13px; color: #767676; text-align: center; }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .loading-msg { padding: 32px 0; text-align: center; font-size: 13px; color: #767676; }

    /* ── Attribution ─────────────────────────────────────────────────────── */
    .embed-footer { font-size: 11px; color: #bbb; text-align: right; padding: 10px 0 0; }
  </style>
</head>
<body>
<div class="embed-wrap">

  <!-- Header -->
  <div class="embed-header">
    <div>
      <h1 class="embed-title">Find your town&rsquo;s results</h1>
      <p class="embed-sub">2026 Maine Primary Election &middot; June 9, 2026</p>
    </div>
    <div class="hdr-logos">
      <img src="public/ddhq-logo.png" alt="DDHQ" style="height:14px;width:auto;opacity:0.75">
      <img src="public/bdn-logo.webp" alt="BDN"  style="height:14px;width:auto">
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-wrap" id="search-wrap">
      <input type="text" id="town-input" class="town-input"
        placeholder="Enter your town or city&hellip;"
        autocomplete="off" spellcheck="false"
        oninput="onInput(this.value)"
        onkeydown="onKeydown(event)">
      <span class="search-icon" id="search-icon">&#x1F50D;</span>
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()" aria-label="Clear">&#x2715;</button>
      <ul id="ac-drop" class="autocomplete-drop" style="display:none" role="listbox"></ul>
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state">
    <div class="empty-icon">&#x1F4CD;</div>
    <p>Type your Maine town or city above to see local results for every race on your ballot.</p>
    <p id="demo-note" class="empty-demo-note"></p>
  </div>

  <!-- Loading -->
  <div id="loading-state" style="display:none" class="loading-msg">Loading results&hellip;</div>

  <!-- Results -->
  <div id="results-wrap" style="display:none">
    <div class="results-hdr">
      <div>
        <div id="results-town"   class="results-town"></div>
        <div id="results-county" class="results-county"></div>
      </div>
      <div id="results-upd" class="results-upd"></div>
    </div>
    <div id="race-groups"></div>
  </div>

  <div class="embed-footer">Results by Decision Desk HQ &middot; Bangor Daily News</div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Set TOWN_API_BASE to your app's base URL, e.g.:
//   'https://your-vercel-app.vercel.app/api/town'
// The embed calls: TOWN_API_BASE + '/' + encodeURIComponent(townName)
// Response: array of race objects (see /app/api/town/[name]/route.ts)
var TOWN_API_BASE = 'https://bdn-election-results.vercel.app/api/town';

var TOWNS_JSON = 'public/towns.json'; // path to towns list for autocomplete
var POLL_MS    = 30000;

// ── Race grouping ─────────────────────────────────────────────────────────────
// Returns a display group label for a race object
function raceGroup(r) {
  var o = r.office;
  if (o === 'Governor' || o === 'US Senate')       return 'Statewide';
  if (o === 'US House')                            return 'Congressional';
  if (o === 'State Senate')                        return 'State Senate';
  if (o === 'State House')                         return 'State House';
  if (/County|Sheriff|Probate|Register|Treasurer|District Attorney/.test(o)) return 'County';
  return 'Municipal';
}
var GROUP_ORDER = ['Statewide','Congressional','State Senate','State House','County','Municipal'];

// ── Colors ────────────────────────────────────────────────────────────────────
var DEM_COLORS = ['#1A5FAB','#2980B9','#1ABC9C','#2C3E6B','#5B8FD4','#8EC6E6'];
var REP_COLORS = ['#CC2929','#E67E22','#8E44AD','#C0392B','#D35400','#884EA0'];
var NON_COLORS = ['#444444','#888888','#aaaaaa','#cccccc'];
var OTHER_CLR  = '#aaaaaa';

function partyCls(party) {
  if (party === 'Democratic') return 'dem';
  if (party === 'Republican') return 'rep';
  return 'non';
}
function partyPalette(party) {
  if (party === 'Democratic') return DEM_COLORS;
  if (party === 'Republican') return REP_COLORS;
  return NON_COLORS;
}

function buildColorMap(cands, votes, total, party) {
  var pal = partyPalette(party);
  var map = {}, i, id;
  if (cands.length >= 5 && total > 0) {
    var s = cands.slice().sort(function(a,b){return(votes[String(b.cand_id)]||0)-(votes[String(a.cand_id)]||0);});
    var idx = 0;
    for (i = 0; i < s.length; i++) {
      id = s[i].cand_id;
      map[id] = ((votes[String(id)]||0)/total*100) > 10 ? pal[idx++] : OTHER_CLR;
    }
    return map;
  }
  for (i = 0; i < cands.length; i++) map[cands[i].cand_id] = pal[i % pal.length];
  return map;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString(); }
function sumObj(o) { var t=0,k=Object.keys(o); for(var i=0;i<k.length;i++) t+=o[k[i]]||0; return t; }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function officeLine(r) {
  return r.district ? r.office + ', District ' + r.district : r.office;
}

// ── State ─────────────────────────────────────────────────────────────────────
var townsList    = [];
var selectedTown = null;
var pollTimer    = null;
var acIdx        = -1;

// ── Load towns for autocomplete ───────────────────────────────────────────────
fetch(TOWNS_JSON, {cache:'force-cache'})
  .then(function(r){return r.json();})
  .then(function(d){
    townsList = Array.isArray(d) ? d : [];
    if (!TOWN_API_BASE) {
      document.getElementById('demo-note').textContent =
        'Demo mode — set TOWN_API_BASE to load live results for any town.';
    }
  })
  .catch(function(){townsList=[];});

// ── Autocomplete ──────────────────────────────────────────────────────────────
function onInput(val) {
  toggleClear(val);
  acIdx = -1;
  var drop = document.getElementById('ac-drop');
  if (!val.trim()) { drop.style.display='none'; return; }
  var q = val.toLowerCase();
  var list = townsList.length ? townsList : [];
  var starts=[], contains=[];
  for (var i=0; i<list.length; i++) {
    var n=list[i], nl=n.toLowerCase();
    if (nl.indexOf(q)===0) starts.push(n);
    else if (nl.indexOf(q)!==-1) contains.push(n);
    if (starts.length+contains.length>=8) break;
  }
  var matches = starts.concat(contains).slice(0,8);
  if (!matches.length) { drop.style.display='none'; return; }
  var re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i');
  var html='';
  for (var j=0; j<matches.length; j++) {
    var nm=matches[j];
    var safe=nm.replace(/'/g,'&#39;');
    html+='<li onclick="selectTown(\''+safe+'\')">' +
      nm.replace(re,'<span class="ac-match">$1</span>') + '</li>';
  }
  drop.innerHTML=html;
  drop.style.display='block';
}

function onKeydown(e) {
  var drop=document.getElementById('ac-drop');
  var items=drop.querySelectorAll('li');
  if (e.key==='ArrowDown'){ acIdx=Math.min(acIdx+1,items.length-1); setActive(items); e.preventDefault(); }
  else if (e.key==='ArrowUp'){ acIdx=Math.max(acIdx-1,-1); setActive(items); e.preventDefault(); }
  else if (e.key==='Enter'){
    if (acIdx>=0&&items[acIdx]) items[acIdx].click();
    else if (items.length===1) items[0].click();
    e.preventDefault();
  } else if (e.key==='Escape') { drop.style.display='none'; }
}

function setActive(items) {
  for (var i=0;i<items.length;i++) items[i].className = i===acIdx?'ac-active':'';
}

function toggleClear(val) {
  document.getElementById('clear-btn').style.display = val?'block':'none';
  document.getElementById('search-icon').style.display = val?'none':'block';
}

document.addEventListener('click', function(e) {
  var wrap=document.getElementById('search-wrap');
  var drop=document.getElementById('ac-drop');
  if (wrap&&!wrap.contains(e.target)) drop.style.display='none';
});

function clearSearch() {
  document.getElementById('town-input').value='';
  document.getElementById('ac-drop').style.display='none';
  toggleClear('');
  selectedTown=null;
  document.getElementById('results-wrap').style.display='none';
  document.getElementById('loading-state').style.display='none';
  document.getElementById('empty-state').style.display='';
  if (pollTimer){clearInterval(pollTimer);pollTimer=null;}
}

// ── Select town ───────────────────────────────────────────────────────────────
function selectTown(name) {
  selectedTown=name;
  document.getElementById('town-input').value=name;
  document.getElementById('ac-drop').style.display='none';
  toggleClear(name);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('results-wrap').style.display='none';
  document.getElementById('loading-state').style.display='';
  document.getElementById('results-town').textContent=name;
  document.getElementById('results-county').textContent='';

  fetchTown(name);

  if (pollTimer) clearInterval(pollTimer);
  if (TOWN_API_BASE) {
    pollTimer=setInterval(function(){if(selectedTown)fetchTown(selectedTown);},POLL_MS);
  }
}

// ── Fetch & render ────────────────────────────────────────────────────────────
function fetchTown(name) {
  if (!TOWN_API_BASE) { renderMock(name); return; }
  fetch(TOWN_API_BASE+'/'+encodeURIComponent(name),{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(data){
      document.getElementById('loading-state').style.display='none';
      document.getElementById('results-wrap').style.display='';
      renderResults(data, name);
      var upd=document.getElementById('results-upd');
      upd.textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
    })
    .catch(function(){
      document.getElementById('loading-state').style.display='none';
      document.getElementById('results-wrap').style.display='';
      document.getElementById('race-groups').innerHTML=
        '<p style="color:#767676;font-size:13px">Could not load results. Please try again.</p>';
    });
}

// ── Render: live results ──────────────────────────────────────────────────────
function renderResults(races, townName) {
  if (!races.length) {
    document.getElementById('race-groups').innerHTML=
      '<p style="color:#767676;font-size:13px">No results found for '+escHtml(townName)+'. The town may not have reported yet.</p>';
    return;
  }

  // Set county from first race
  if (races[0] && races[0].county) {
    document.getElementById('results-county').textContent=races[0].county+' County';
  }

  // Group races
  var groups={};
  for (var i=0;i<races.length;i++) {
    var r=races[i], g=raceGroup(r);
    if (!groups[g]) groups[g]=[];
    groups[g].push(r);
  }

  var html='';
  for (var gi=0;gi<GROUP_ORDER.length;gi++) {
    var label=GROUP_ORDER[gi];
    if (!groups[label]||!groups[label].length) continue;
    html+='<div class="race-group">' +
      '<div class="race-group-label">'+label+'</div>' +
      '<div class="race-grid">';
    for (var ri=0;ri<groups[label].length;ri++) {
      html+=renderCard(groups[label][ri], townName);
    }
    html+='</div></div>';
  }
  document.getElementById('race-groups').innerHTML=html;
}

function renderCard(r, townName) {
  var votes   = r.town_votes || {};
  var total   = r.town_total || 0;
  var cands   = r.candidates || [];
  var cls     = partyCls(r.party);
  var calledId= r.called_candidates&&r.called_candidates[0];
  var isSpecial = r.election_type_id===9;
  var partyLabel = isSpecial ? 'Special Election' :
    r.party==='Democratic' ? 'Democratic Primary' :
    r.party==='Republican' ? 'Republican Primary' : 'Nonpartisan';

  var hdr='<div class="card-hdr">' +
    '<div class="card-office">'+escHtml(officeLine(r))+'</div>' +
    '<div class="card-badges">' +
      '<span class="party-pill '+cls+'">'+partyLabel+'</span>' +
      (r.called&&calledId?'<span class="called-pill">Called</span>':'') +
    '</div></div>';

  if (total===0) {
    var pal = partyPalette(r.party);
    var preBody = '<div class="card-body">';
    // Yes/No races: always show Yes first unless No is leading
    var preSorted = cands.slice().sort(function(a,b){
      var aY=/^yes$/i.test(a.last_name), bY=/^yes$/i.test(b.last_name);
      if(aY&&!bY) return -1; if(bY&&!aY) return 1; return 0;
    });
    for (var pi=0; pi<preSorted.length; pi++) {
      var pc = preSorted[pi];
      var pname = pc.first_name+' '+pc.last_name+(pc.suffix?' '+pc.suffix:'');
      preBody += '<div class="cand-row">' +
        '<span class="cand-dot" style="background:'+pal[pi%pal.length]+'"></span>' +
        '<span class="cand-name">'+escHtml(pname)+'</span>' +
      '</div>';
    }
    preBody += '</div>';
    return '<div class="race-card">'+hdr+preBody+'</div>';
  }

  var colorMap=buildColorMap(cands,votes,total,r.party);
  var sorted=cands.slice().sort(function(a,b){
    var diff=(votes[String(b.cand_id)]||0)-(votes[String(a.cand_id)]||0);
    if(diff!==0) return diff;
    // Tie-break: Yes before No
    var aY=/^yes$/i.test(a.last_name), bY=/^yes$/i.test(b.last_name);
    if(aY&&!bY) return -1; if(bY&&!aY) return 1; return 0;
  });

  var maxV=votes[String(sorted[0].cand_id)]||0;
  var body='<div class="card-body">';
  for (var i=0;i<sorted.length;i++) {
    var c=sorted[i];
    var v=votes[String(c.cand_id)]||0;
    if (v===0) continue;
    var pct=(v/total*100).toFixed(1);
    var barW=maxV>0?(v/maxV*100).toFixed(1):0;
    var col=colorMap[c.cand_id];
    var isLdr=i===0;
    var isWinner=c.cand_id===calledId&&r.called;
    var name=c.first_name+' '+c.last_name+(c.suffix?' '+c.suffix:'');
    body+=
      '<div class="cand-row">' +
        '<span class="cand-name'+(isLdr||isWinner?' leader':'')+'">'+escHtml(name)+(isWinner?' ✓':'')+'</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:'+barW+'%;background:'+col+'"></div></div>' +
        '<span class="cand-pct" style="color:'+(isLdr?col:'#767676')+'">'+pct+'%</span>' +
        '<span class="cand-votes">'+fmt(v)+'</span>' +
      '</div>';
  }
  body+='</div>';

  var foot='<div class="card-foot">'+fmt(total)+' votes cast</div>';
  return '<div class="race-card">'+hdr+body+foot+'</div>';
}

// ── Mock mode (TOWN_API_BASE is null) ─────────────────────────────────────────
var MOCK_DATA = {
  'Portland': [
    {office:'Governor',party:'Democratic',district:null,election_type_id:2,called:false,called_candidates:[],town_total:7120,county:'Cumberland',
     candidates:[{cand_id:950890,first_name:'Shenna',last_name:'Bellows',suffix:''},{cand_id:950891,first_name:'Troy',last_name:'Jackson',suffix:''},{cand_id:950892,first_name:'Angus',last_name:'King',suffix:'III'},{cand_id:950893,first_name:'Hannah',last_name:'Pingree',suffix:''},{cand_id:950894,first_name:'Nirav',last_name:'Shah',suffix:''}],

      'Demo data is only available for Portland and Bangor. Set <code>TOWN_API_BASE</code> to load live results for any Maine town.'+
      '</p>';
    return;
  }
  renderResults(data, townName);
}
